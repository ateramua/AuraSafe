<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair AuraSafe Extension - Firefox Compatible</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0a2a0a 0%, #0f3a0f 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(20, 40, 20, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 2rem;
      border: 1px solid rgba(76, 175, 80, 0.3);
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      font-size: 48px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #a5d6a5);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    h2 {
      margin-bottom: 1rem;
      color: #C8E6C9;
    }

    .instructions {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .instructions ol {
      padding-left: 1.2rem;
      margin-top: 0.5rem;
    }

    .instructions li {
      margin-bottom: 0.5rem;
    }

    .code-container {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #c8e6c9;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1rem;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 1px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #4caf50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
      outline: none;
    }

    /* Firefox-specific focus styling */
    input:focus-visible {
      outline: 2px solid #4caf50;
      outline-offset: 1px;
    }

    .button-group {
      display: flex;
      gap: 1rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.5);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    /* Firefox button focus styles */
    .btn:focus-visible {
      outline: 2px solid #4caf50;
      outline-offset: 2px;
    }

    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid #10b981;
      color: #6ee7b7;
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .status.info {
      display: block;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid #3b82f6;
      color: #93c5fd;
    }

    /* Loading spinner for Firefox */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive design */
    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }
      
      .container {
        padding: 1.5rem;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      .logo-text {
        font-size: 20px;
      }
      
      .logo-icon {
        font-size: 36px;
      }
    }

    /* Firefox scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(20, 40, 20, 0.5);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #2e7d32;
      border-radius: 4px;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #2e7d32 rgba(20, 40, 20, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🔒</div>
      <div class="logo-text">AuraSafe</div>
    </div>

    <h2>🔗 Pair with Desktop App</h2>

    <div class="instructions">
      <strong>📋 How to get your pairing code:</strong>
      <ol>
        <li>Open the AuraSafe desktop application</li>
        <li>Go to <strong>Settings → Browser Extension</strong></li>
        <li>Click <strong>"Pair New Device"</strong> or <strong>"Show Pairing Code"</strong></li>
        <li>Copy the code shown in the desktop app</li>
        <li>Paste it below and click <strong>"Pair"</strong></li>
      </ol>
    </div>

    <div class="code-container">
      <label for="pairingCode">🔑 Pairing Code</label>
      <input type="text" id="pairingCode" placeholder="Enter 32-character code" autocomplete="off" autofocus>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" id="pairBtn">🔗 Pair Extension</button>
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
    </div>

    <div id="status" class="status" role="alert" aria-live="polite"></div>
  </div>

  <script src="pairing.js"></script>
</body>
</html>
