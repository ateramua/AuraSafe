<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AuraSafe Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="sidepanel">
      <header class="hero">
        <div>
          <p class="eyebrow">AuraSafe</p>
          <h1>Companion panel</h1>
          <p id="statusText" class="muted">Checking desktop bridge...</p>
        </div>
        <span id="statusPill" class="pill">Checking</span>
      </header>

      <section class="grid">
        <article class="card accent">
          <p class="metric-label">Current site</p>
          <h2 id="activeSite">Active tab</h2>
          <p id="siteMatchCount" class="muted">Looking for matching vault entries.</p>
        </article>
        <article class="card">
          <p class="metric-label">Vault entries</p>
          <h2 id="vaultCount">--</h2>
          <p id="vaultState" class="muted">Waiting for vault status.</p>
        </article>
        <article class="card">
          <p class="metric-label">Financial activity</p>
          <h2 id="transactionCount">--</h2>
          <p id="financeState" class="muted">Transactions available from desktop.</p>
        </article>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Suggested fills</h2>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
        <ul id="entryList" class="entry-list" aria-live="polite"></ul>
      </section>

      <section class="section">
        <h2>Quick actions</h2>
        <div class="actions">
          <button id="connectButton" type="button">Reconnect desktop</button>
          <button id="settingsButton" type="button">Extension settings</button>
        </div>
      </section>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
