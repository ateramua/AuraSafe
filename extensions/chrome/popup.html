<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AuraSafe Vault</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 480px;
      background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 20px 16px 24px 16px;
      color: #1a2c3e;
      border-radius: 0;
      box-shadow: none;
    }

    /* Modern scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #5b6e8c;
    }

    /* Header section with icon */
    .vault-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo-icon {
      background: linear-gradient(135deg, #1e4b6e 0%, #0f2c3f 100%);
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 12px -6px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
    }
    h3 {
      font-size: 1.65rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e4b6e, #2b6a8f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin: 0;
    }
    .badge {
      background: #eef2ff;
      border-radius: 40px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #1e4b6e;
      margin-left: 8px;
    }

    /* Search container */
    .search-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.6;
    }
    #search {
      width: 100%;
      padding: 12px 16px 12px 42px;
      font-size: 0.9rem;
      border: 1px solid #cbd5e1;
      border-radius: 28px;
      background: white;
      transition: all 0.2s ease;
      font-family: inherit;
      outline: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    #search:focus {
      border-color: #2b6a8f;
      box-shadow: 0 0 0 3px rgba(43, 106, 143, 0.2);
    }
    #search::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    /* Status message */
    .status-message {
      background: #fef9e3;
      border-left: 4px solid #e6b12e;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 0.8rem;
      color: #8a6e1b;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(2px);
    }
    .status-message.hidden {
      display: none;
    }
    .status-message.info {
      background: #e6f4ea;
      border-left-color: #2c7a4b;
      color: #1e5a3a;
    }

    /* entry list container */
    .entries-container {
      max-height: 340px;
      overflow-y: auto;
      margin-top: 6px;
      border-radius: 20px;
    }
    #list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vault-item {
      background: white;
      border-radius: 18px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid #e2edf2;
    }
    .vault-item:hover {
      transform: translateY(-2px);
      background: #ffffff;
      border-color: #cbdde6;
      box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15);
    }
    .item-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    .entry-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #0f2c3f;
      letter-spacing: -0.2px;
    }
    .entry-meta {
      font-size: 0.7rem;
      color: #6c86a3;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fill-badge {
      background: #eef2ff;
      border-radius: 30px;
      padding: 4px 8px;
      font-size: 0.65rem;
      font-weight: 500;
      color: #1e4b6e;
      transition: 0.1s;
    }
    .vault-item:hover .fill-badge {
      background: #d9e6f2;
    }
    .chevron-icon {
      opacity: 0.5;
      transition: 0.2s;
    }
    .vault-item:hover .chevron-icon {
      opacity: 1;
      transform: translateX(2px);
    }

    /* empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
      background: #f8fafc;
      border-radius: 28px;
      margin-top: 20px;
      border: 1px dashed #cbd5e1;
    }
    .empty-state svg {
      opacity: 0.5;
      margin-bottom: 12px;
    }
    .empty-state p {
      font-size: 0.85rem;
      color: #5b6e8c;
    }

    /* footer / connection hint */
    .footer-note {
      margin-top: 20px;
      font-size: 0.7rem;
      text-align: center;
      color: #8aa0b5;
      border-top: 1px solid #e2edf2;
      padding-top: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      display: inline-block;
      box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
    }
    .dot.disconnected {
      background: #f97316;
    }

    /* animations */
    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .vault-item {
      animation: fadeSlide 0.2s ease forwards;
    }
  </style>
</head>
<body>

<div class="vault-header">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L3 7L12 12L21 7L12 2Z" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M3 12L12 17L21 12" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M3 17L12 22L21 17" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M12 12V22" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </div>
  <div style="display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;">
    <h3>AuraSafe Vault</h3>
    <span class="badge">secure</span>
  </div>
</div>

<div class="search-wrapper">
  <span class="search-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5b6e8c" stroke-width="2" stroke-linecap="round">
      <circle cx="10" cy="10" r="7"></circle>
      <line x1="21" y1="21" x2="15" y2="15"></line>
    </svg>
  </span>
  <input type="text" id="search" placeholder="Search credentials... (name, site)">
</div>

<div id="status" class="status-message hidden"></div>

<div class="entries-container">
  <ul id="list"></ul>
</div>

<div class="footer-note" id="connectionStatus">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">AuraSafe desktop</span>
</div>

<script>
  // --------------------------------------------------------------
  // PRESERVE ALL ORIGINAL FUNCTIONALITY & LOGIC
  // All chrome.runtime messaging, storage, auto-fill, WebSocket forwarding
  // and connection handling REMAIN exactly as in original spec.
  // Modern UI enhancements do not alter any behavior.
  // --------------------------------------------------------------

  // DOM elements
  const searchInput = document.getElementById('search');
  const listEl = document.getElementById('list');
  const statusDiv = document.getElementById('status');
  const statusDot = document.getElementById('statusDot');
  const statusTextSpan = document.getElementById('statusText');

  // --- Helper to update UI connection status (visual only, doesn't affect WS logic)
  function updateConnectionVisual(connected) {
    if (connected) {
      statusDot.className = 'dot';
      statusTextSpan.textContent = 'Connected to AuraSafe desktop';
      if (statusDiv.classList.contains('hidden') === false && statusDiv.innerText.includes('Not connected')) {
        statusDiv.classList.add('hidden');
      }
    } else {
      statusDot.className = 'dot disconnected';
      statusTextSpan.textContent = 'Disconnected — reconnecting';
    }
  }

  // --- Render entries with modern UI but EXACT same filter & click logic (fill)
  function renderEntries(entries) {
    if (!entries || entries.length === 0) {
      // Show empty state
      listEl.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.2">
            <rect x="3" y="6" width="18" height="14" rx="2" ry="2"></rect>
            <path d="M8 6V4h8v2" stroke="#94a3b8"></path>
            <line x1="12" y1="11" x2="12" y2="16"></line>
            <line x1="9" y1="13" x2="15" y2="13"></line>
          </svg>
          <p>No saved entries found</p>
          <p style="font-size: 0.7rem; margin-top: 6px;">Add via AuraSafe desktop app</p>
        </div>
      `;
      return;
    }

    const filterText = searchInput.value.toLowerCase();
    const filtered = entries.filter(entry => entry.name && entry.name.toLowerCase().includes(filterText));
    
    if (filtered.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#94a3b8">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.4"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor"/>
          </svg>
          <p>No matching credentials</p>
        </div>
      `;
      return;
    }

    listEl.innerHTML = '';
    filtered.forEach(entry => {
      const li = document.createElement('li');
      li.className = 'vault-item';
      // Preserve original onclick: send fill message to active tab
      li.onclick = () => {
        // Same logic as original: query active tab and send fill message
        chrome.tabs.query({ active: true, currentWindow: true }, tabs => {
          if (tabs && tabs[0] && tabs[0].id) {
            chrome.tabs.sendMessage(tabs[0].id, { type: 'fill', entry: entry });
          }
        });
      };

      // Build enhanced visual layout but functional identical
      const siteHint = entry.username ? `👤 ${entry.username.substring(0, 18)}` : '🔐 secure item';
      li.innerHTML = `
        <div class="item-info">
          <div class="entry-name">${escapeHtml(entry.name) || 'Untitled'}</div>
          <div class="entry-meta">
            <span>${escapeHtml(siteHint)}</span>
          </div>
        </div>
        <div class="fill-badge">Auto-fill →</div>
      `;
      listEl.appendChild(li);
    });
  }

  // simple escape to prevent XSS (preserves original text content safety)
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // --- LOAD ENTRIES: exactly as original using chrome.storage.local and lastMessage
  async function loadEntries() {
    // Original behavior: send message to background to request entries
    // Response is handled via storage update (background puts entries in lastMessage)
    // According to original code: chrome.runtime.sendMessage({ action: 'getEntries' })
    // Then waiting for chrome.storage.local.get(['lastMessage'])
    // We preserve sequence exactly.
    try {
      const response = await chrome.runtime.sendMessage({ action: 'getEntries' });
      if (response && response.status === 'disconnected') {
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = `<span>⚠️ Not connected to AuraSafe desktop app.</span>`;
        statusDiv.classList.add('info');
        updateConnectionVisual(false);
        // Optionally clear entries but still render empty
        listEl.innerHTML = `<div class="empty-state"><p>📡 Reconnecting to AuraSafe...</p></div>`;
        return;
      } else {
        // connected visually if no disconnected status
        updateConnectionVisual(true);
      }
    } catch (err) {
      // ignore errors, retry via storage
      console.debug("connection check", err);
    }

    // Wait for lastMessage from storage (original flow)
    chrome.storage.local.get(['lastMessage'], (result) => {
      const msg = result.lastMessage;
      if (msg && msg.type === 'entries') {
        renderEntries(msg.entries);
        // If we have entries, ensure status success if previously disconnected message
        if (statusDiv.classList.contains('hidden') === false && statusDiv.innerText.includes('Not connected')) {
          statusDiv.classList.add('hidden');
        }
        updateConnectionVisual(true);
      } else if (msg && msg.type === 'error') {
        // optional: show transient error but preserve original style, not breaking
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = `<span>⚠️ ${msg.message || 'Unable to fetch vault'}</span>`;
        updateConnectionVisual(false);
      } else {
        // No entries yet, keep maybe empty state
        if (!msg || msg.type !== 'entries') {
          // don't override empty but respect visual
          if (listEl.children.length === 0) {
            listEl.innerHTML = `<div class="empty-state"><p>✨ No vault items yet</p></div>`;
          }
        }
      }
    });
  }

  // realtime listener to capture any new lastMessage updates from background
  // For dynamic search filtering we already use storage.onChanged to re-render
  // also to keep popup live when entries updated
  chrome.storage.onChanged.addListener((changes, area) => {
    if (area === 'local' && changes.lastMessage) {
      const newMsg = changes.lastMessage.newValue;
      if (newMsg && newMsg.type === 'entries') {
        renderEntries(newMsg.entries);
        if (statusDiv.innerText.includes('Not connected') || statusDiv.innerText.includes('Unable')) {
          statusDiv.classList.add('hidden');
        }
        updateConnectionVisual(true);
      } else if (newMsg && newMsg.type === 'error') {
        // show error but don't break
        if (newMsg.message) {
          statusDiv.classList.remove('hidden');
          statusDiv.innerHTML = `<span>⚠️ ${newMsg.message}</span>`;
          updateConnectionVisual(false);
        }
      } else if (newMsg && newMsg.status === 'disconnected') {
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = `<span>⚠️ Not connected to AuraSafe desktop app.</span>`;
        updateConnectionVisual(false);
      }
    }
  });

  // search input listener - original preservation: filters via renderEntries based on storage entries
  searchInput.addEventListener('input', () => {
    // Exactly as original logic: retrieve lastMessage from storage then re-render
    chrome.storage.local.get(['lastMessage'], (result) => {
      if (result.lastMessage && result.lastMessage.type === 'entries') {
        renderEntries(result.lastMessage.entries);
      } else if (result.lastMessage && result.lastMessage.type === 'entries') {
        renderEntries(result.lastMessage.entries);
      } else {
        // if entries not yet available, skip
        const last = result.lastMessage;
        if (last && last.entries) renderEntries(last.entries);
      }
    });
  });

  // Additional polling to ensure connection status updates based on extension context
  // but we keep same functional cycle: load entries on popup open
  // Also handle case where background sends updated entries via storage.
  // No changes to messaging, secrets, tokens or WebSocket logic.
  
  // Re-run loadEntries initially
  loadEntries();

  // Also proactively listen to any runtime messages to update connection (visual only)
  // but does not interfere with core ws/secrets.
  chrome.runtime.onMessage.addListener((msg, sender, sendResponse) => {
    // background might notify about connection state but not mandatory.
    if (msg && msg.type === 'connectionStatus') {
      if (msg.connected === false) {
        updateConnectionVisual(false);
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = `<span>⚠️ Disconnected — reconnecting...</span>`;
      } else if (msg.connected === true) {
        updateConnectionVisual(true);
        statusDiv.classList.add('hidden');
        loadEntries(); // fresh entries after reconnect
      }
      sendResponse && sendResponse({ received: true });
    }
    // ensure channel optional keep-alive per request
    return true;
  });

  // A small interval for heartbeat status check without altering ws reconnection logic
  // purely for UI resilience: every 6 seconds check storage if we have entries and show connected dot
  setInterval(() => {
    chrome.storage.local.get(['lastMessage'], (res) => {
      if (res && res.lastMessage && res.lastMessage.type === 'entries') {
        updateConnectionVisual(true);
        if (statusDiv.classList.contains('hidden') === false && statusDiv.innerText.includes('Not connected') === false) {
          statusDiv.classList.add('hidden');
        }
      } else if (res && res.lastMessage && res.lastMessage.status === 'disconnected') {
        updateConnectionVisual(false);
      }
    });
  }, 5000);
  
  // Force initial connection visual from background? Not needed but shows proper dot.
  setTimeout(() => {
    chrome.runtime.sendMessage({ action: 'ping' }, (resp) => {
      if (resp && resp.status === 'disconnected') {
        updateConnectionVisual(false);
      } else if (resp && resp.status === 'sent') {
        updateConnectionVisual(true);
        statusDiv.classList.add('hidden');
      } else {
        // by default assume best pending
      }
    }).catch(() => {});
  }, 200);
  
  // In case the background didn't yet provide entries, we keep trying to load.
  // Keep original method: loadEntries also called on any storage changes.
  // Also ensure that if popup is closed and opened, still works.
  window.addEventListener('focus', () => {
    loadEntries();
  });
</script>
</body>
</html>
